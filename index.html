<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <title>IP Location</title>
    <style>
     
      body {
        width: 100vw;
        height: 100vh;
        position: relative;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
      }
      .center {
        transform: translate(5%, -5%);
        border-radius: 1.5rem;
      }
      .info {
        font-weight: bold;
        position: absolute;
        padding: 2% 5%;
        border-radius: 1rem;
        top: 2%;
        left: 2%;
        opacity: 90%;
      }
      .img {
        border-radius: 1.5rem;
        overflow: hidden;
      }
      .cf {
        padding: 1rem;
        background-color: rgb(238, 238, 238);
        border-radius: 1rem;
        font-weight: bold;
      }
      @media (min-width: 992px) {
        .center{
            width: 80%;
        }
      }
      @media (max-width: 991.98px) {
        .center{
            width: 90%;
        }
      }
    </style>
  </head>
  <body>
    <main>
    <div class="card center">
      <span class="bg-warning info">Info</span>
      <div class="img">
        <img src="https://cdn.ipwhois.io/flags/gb.svg" class="card-img-top" />
      </div>
      <div class="card-body">
        <h3 class="card-title">United Kingdom</h3>
        <h6 class="card-subtitle">Torquay</h6>
        <p class="card-text">isp: Krystal Hosting Ltd</p>
        <div class="cf">
          <p>IP: 77.72.5.113</p>
          <p>Latitude: 50.4619209</p>
          <p>Longitude: -3.525315</p>
        </div>
      </div>
    </div>
</main>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
      integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
      integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
      crossorigin="anonymous"
    ></script>
    <script type="text/JavaScript" src="main.js"></script>
  </body>
</html>
